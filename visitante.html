<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QR Timbre</title><link rel="stylesheet" href="/styles.css"></head><body><div class="wrap"><main class="card"><span class="pill" id="pill">Timbre digital</span><h1 id="title">Timbre</h1><p class="muted" id="stateText"></p><div id="disabled" class="notice hidden"></div><div id="form"><div id="chooseBox" class="hidden"><label>Enviar a</label><select id="dest"></select></div><div id="freeBox"><label>Mensaje opcional</label><textarea id="freeMsg" placeholder="Agregá un detalle si querés"></textarea></div><div class="actions" id="actions"></div></div><p class="small">Al tocar una opción se abre WhatsApp con el mensaje armado. Tenés que tocar Enviar dentro de WhatsApp.</p></main></div><script>
const $=id=>document.getElementById(id);function dec(s){try{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return JSON.parse(decodeURIComponent(escape(atob(s))))}catch(e){return null}}function wa(num,text){return 'https://wa.me/'+num+'?text='+encodeURIComponent(text)}const params=new URLSearchParams(location.search);const cfg=dec(params.get('c')||'');if(!cfg||!cfg.numbers||!cfg.numbers.length){$('title').textContent='QR no configurado';$('stateText').textContent='El dueño tiene que generar el QR desde /dueno.';$('form').classList.add('hidden')}else{render(cfg)}function render(cfg){$('title').textContent=cfg.houseName||'Casa';$('stateText').textContent=(cfg.stateMessages&&cfg.stateMessages[cfg.status])||'Elegí qué querés hacer:';if(cfg.status==='desactivado'){$('form').classList.add('hidden');$('disabled').classList.remove('hidden');$('disabled').textContent=(cfg.stateMessages&&cfg.stateMessages.desactivado)||'El timbre digital no está disponible.';return}if(cfg.multiMode==='choose'&&cfg.numbers.length>1){$('chooseBox').classList.remove('hidden');cfg.numbers.forEach((n,i)=>{const o=document.createElement('option');o.value=n;o.textContent='Dueño '+(i+1);$('dest').appendChild(o)})}if(cfg.status==='no_molestar'||cfg.status==='solo_mensajes'||cfg.status==='vacaciones'){}const acts=[];if(cfg.actions.door)acts.push(['Estoy en la puerta',cfg.texts.door]);if(cfg.actions.pack)acts.push(['Traigo/dejo paquete',cfg.texts.pack]);if(cfg.actions.id)acts.push(['Identificarme',cfg.texts.id]);if(cfg.actions.audio)acts.push(['Mandar audio',cfg.texts.audio]);if(cfg.actions.video)acts.push(['Mandar video',cfg.texts.video]);if(cfg.actions.free)acts.push(['Enviar mensaje libre','']);acts.forEach(([label,msg])=>{const b=document.createElement('button');b.className='btn';b.textContent=label;b.onclick=()=>openWA(cfg,msg);$('actions').appendChild(b)})}function number(cfg){return cfg.multiMode==='choose'&&cfg.numbers.length>1?$('dest').value:cfg.numbers[0]}function openWA(cfg,msg){let extra=$('freeMsg').value.trim();let text=msg||cfg.baseMsg||'Hola, estoy en la puerta.';if(extra)text+='\n\nMensaje: '+extra;location.href=wa(number(cfg),text)}
</script></body></html>
